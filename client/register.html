<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatLili - 注册</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-box {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px 40px 40px 40px;
            background: #2f3136;
            border-radius: 16px;
            border: 1px solid #40444b;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            position: relative;
        }
        
        .back-button {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #40444b;
            color: #b9bbbe;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            z-index: 10;
            padding: 0;
            line-height: 1;
        }
        
        .back-button:hover {
            background: #5865f2;
            color: white;
            transform: scale(1.05);
        }
        
        .logo {
            text-align: center;
            margin: 10px 0 30px 0;
        }
        
        .logo h2 {
            color: #fff;
            margin: 0;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #b9bbbe;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #40444b;
            border: 1px solid #202225;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        
        .form-group input:focus {
            border-color: #5865f2;
        }
        
        .btn-register {
            width: 100%;
            padding: 12px;
            background: #3ba55d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            background: #2d7e46;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #72767d;
            font-size: 14px;
        }
        
        .login-link a {
            color: #5865f2;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #f04747;
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(240,71,71,0.1);
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .success-message {
            color: #3ba55d;
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(59,165,93,0.1);
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .password-hint {
            color: #72767d;
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* 加载动画 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #40444b;
            border-top-color: #3ba55d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        .loading-text {
            color: #fff;
            font-size: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载遮罩层 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">注册成功，正在登录...</div>
    </div>

    <div class="register-box">
        <button class="back-button" onclick="window.location.href='index.html'">←</button>
        
        <div class="logo">
            <h2>创建 ChatLili 账号</h2>
        </div>
        
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="至少2个字符" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="至少6位">
        </div>
        
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmPassword" placeholder="再次输入密码">
            <div id="passwordMatch" class="password-hint"></div>
        </div>
        
        <div class="form-group">
            <label>邮箱（可选）</label>
            <input type="email" id="email" placeholder="用于找回密码，但还沒开放。你可以选择留下邮箱">
        </div>
        
        <button class="btn-register" onclick="handleRegister()" id="registerBtn">注册</button>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div class="login-link">
            已有账号？ <a href="login.html">立即登录</a>
        </div>
    </div>
    
    <script>
        // 大厅服务器地址
        const LOBBY_URL = window.location.origin;
        
        // Cookie 工具函数
        function setCookie(name, value, days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }
        
        function deleteCookie(name) {
            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        }
        
        // 显示加载遮罩
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('registerBtn').disabled = true;
        }
        
        // 隐藏加载遮罩
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
            document.getElementById('registerBtn').disabled = false;
        }
        
        // 密码匹配检查
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirm = this.value;
            const hint = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                hint.textContent = '';
            } else if (password === confirm) {
                hint.textContent = '✓ 密码匹配';
                hint.style.color = '#3ba55d';
            } else {
                hint.textContent = '✗ 密码不一致';
                hint.style.color = '#f04747';
            }
        });
        
        async function handleRegister() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value.trim();
            
            // 验证
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }
            
            if (username.length < 2) {
                showError('用户名至少2个字符');
                return;
            }
            
            if (password.length < 6) {
                showError('密码至少6位');
                return;
            }
            
            if (password !== confirm) {
                showError('两次密码不一致');
                return;
            }
            
            if (email && !email.includes('@')) {
                showError('邮箱格式不正确');
                return;
            }
            
            // 显示加载动画
            showLoading();
            
            try {
                console.log('注册到大厅:', `${LOBBY_URL}/api/register`);
                
                const res = await fetch(`${LOBBY_URL}/api/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, email: email || undefined})
                });
                
                const data = await res.json();
                console.log('注册响应:', data);
                
                if (data.status === 'ok') {
                    // 注册成功后自动登录 - 设置 Cookie 和 localStorage
                    setCookie('uid', data.uid, 30);
                    setCookie('username', data.username, 30);
                    setCookie('session_token', data.token, 30);
                    
                    localStorage.setItem('uid', data.uid);
                    localStorage.setItem('user', data.username);
                    localStorage.setItem('session_token', data.token);
                    
                    // 延迟后返回首页（已登录状态）
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    
                } else {
                    hideLoading();
                    showError(data.error || '注册失败');
                }
            } catch (e) {
                hideLoading();
                console.error('注册错误:', e);
                showError('连接服务器失败，请检查网络');
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = '❌ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = '✅ ' + msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        // 页面加载时
        document.addEventListener('DOMContentLoaded', function() {
            // 回车注册
            document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleRegister();
            });
        });
    </script>
</body>
</html>
