<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>输入房间密码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #36393e;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #2f3136;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 360px;
            border: 1px solid #40444b;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
        }

        .server-info {
            background: #40444b;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid #202225;
        }

        .server-name {
            font-size: 18px;
            font-weight: bold;
            color: #00b0f4;
            margin-bottom: 5px;
        }

        .server-desc {
            color: #b9bbbe;
            font-size: 14px;
        }

        .password-input {
            width: 100%;
            padding: 14px;
            background: #40444b;
            border: 2px solid #202225;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin: 20px 0;
            transition: all 0.3s;
            outline: none;
        }

        .password-input:focus {
            border-color: #5865f2;
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.2);
        }

        .password-input::placeholder {
            color: #72767d;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-primary:hover {
            background: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #4f545c;
            color: white;
        }

        .btn-secondary:hover {
            background: #5d6269;
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #f04747;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            background: rgba(240, 71, 71, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(240, 71, 71, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #b9bbbe;
        }

        .loading-spinner {
            border: 3px solid #40444b;
            border-top: 3px solid #5865f2;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>房间密码</h2>
        
        <div class="server-info">
            <div class="server-name" id="serverName">加载中...</div>
            <div class="server-desc" id="serverDesc">请输入房间密码</div>
        </div>

        <input type="password" id="password" class="password-input" placeholder="输入密码" autofocus>

        <div class="buttons">
            <button class="btn-primary" onclick="verifyPassword()" id="submitBtn">进入房间</button>
            <button class="btn-secondary" onclick="goBack()" id="backBtn">返回</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <div>验证中...</div>
        </div>
    </div>

    <script>
        // 从URL获取参数
        const urlParams = new URLSearchParams(window.location.search);
        const ip = urlParams.get('ip');
        const port = urlParams.get('port');
        const httpPort = urlParams.get('http_port') || 5000;
        const serverName = urlParams.get('name') || '聊天室';

        // 检查是否已登录
        const uid = localStorage.getItem('uid');
        const username = localStorage.getItem('user');

        if (!uid || !username) {
            alert('请先登录');
            window.location.href = 'login.html';
        }

        // 显示服务器信息
        document.getElementById('serverName').textContent = decodeURIComponent(serverName);

        async function verifyPassword() {
            const password = document.getElementById('password').value;
            const uid = localStorage.getItem('uid');

            if (!password) {
                showError('请输入密码');
                return;
            }

            if (!uid) {
                showError('未登录，请先登录');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                return;
            }

            // 显示加载状态
            setLoading(true);

            try {
                const response = await fetch(`http://${ip}:${httpPort}/api/room/password/check`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password: password,
                        uid: uid
                    })
                });

                const data = await response.json();

                if (data.verified) {
                    // 密码正确，保存服务器信息并跳转
                    localStorage.setItem('ip', ip);
                    localStorage.setItem('port', port);
                    localStorage.setItem('serverHttpPort', httpPort);
                    localStorage.setItem('serverName', decodeURIComponent(serverName));
                    
                    window.location.href = 'chat.html';
                } else {
                    showError('密码错误，请重试');
                    setLoading(false);
                }
            } catch (error) {
                console.error('验证失败:', error);
                showError('验证失败，请稍后重试');
                setLoading(false);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 3000);
        }

        function setLoading(isLoading) {
            const loadingEl = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            const backBtn = document.getElementById('backBtn');
            
            loadingEl.style.display = isLoading ? 'block' : 'none';
            submitBtn.disabled = isLoading;
            backBtn.disabled = isLoading;
        }

        // 按回车键提交
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });
    </script>
    <!-- 统一心跳管理 -->
    <script src="heartbeat.js"></script>
</body>
</html>
